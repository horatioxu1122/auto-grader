assignment: "hw1_output"
mode: "output_compare"
language: "python"
total_points: 100
submission_pattern: "*.py"
timeout_seconds: 10
strictness: "moderate"

test_cases:
  - name: "Basic output"
    stdin_source: "none"
    return_code_check: "zero"
    return_code_correct_points: 10
    return_code_wrong_points: 0
    stdout_check: "file"
    stdout_file: "expected_basic.txt"
    stdout_correct_points: 40
    stdout_wrong_points: 0
    ignore_whitespace: true

  - name: "With input"
    stdin_source: "text"
    stdin_text: "5\n"
    return_code_check: "zero"
    return_code_correct_points: 10
    return_code_wrong_points: 0
    stdout_check: "file"
    stdout_file: "expected_input.txt"
    stdout_correct_points: 40
    stdout_wrong_points: 0
    ignore_whitespace: true
